apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert -f compose.yml -c -o deploy/atrag
    kompose.version: 1.26.0 (40646f47)
  labels:
    {{- include "atrag.labels" . | nindent 4 }}
  name: atrag-frontend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "atrag.selectorLabels" . | nindent 4 }}
    {{- include "frontend.labels" . | nindent 4 }}